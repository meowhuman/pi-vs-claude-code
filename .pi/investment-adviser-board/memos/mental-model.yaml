# Investment Adviser Board — Mental Model
# Structured expertise that persists across sessions for all board members

# === BOARD ARCHITECTURE ===
board:
  name: investment-adviser-board
  members: 9 agents (ceo, macro-strategist, fundamental-analyst, technical-analyst, risk-officer, market-intelligence, prediction-market-analyst, backtest, position-manager)
  meeting_time: 10 minutes discussion
  ceo_model: openai-codex/gpt-5.2-codex
  member_model: kimi-coding/k2p5

data_flow:
  portfolio_snapshot:
    - path: portfolio-snapshot-user.json
      note: "Latest JSON pointer (always read this first)"
    - path: portfolio-records/YYYY-MM-DD/portfolio-snapshot-user-YYYY-MM-DD.json
      note: "Dated JSON snapshot (authoritative)"
    - path: portfolio-records/YYYY-MM-DD/portfolio-snapshot-user-YYYY-MM-DD.md
      note: "Human annotations only"
  positions:
    path: .pi/execution-desk/positions.json
    note: "Live positions from execution desk"

# === CURRENT STATE ===
current_portfolio:
