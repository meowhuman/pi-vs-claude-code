<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Football Betting Board Report</title>
  <style>
    body { margin: 0; background: #0b1020; color: #e5e7eb; font: 16px/1.7 -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; }
    .wrap { max-width: 980px; margin: 0 auto; padding: 40px 24px 80px; }
    .card { background: #111827; border: 1px solid #243042; border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    h1, h2 { margin: 0 0 16px; }
    .meta { color: #9ca3af; font-size: 14px; }
    .pill { display: inline-block; border: 1px solid #334155; border-radius: 999px; padding: 4px 10px; margin-right: 8px; }
    code { background: #0f172a; padding: 2px 6px; border-radius: 6px; }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Football Betting Board Report</h1>
      <div class="meta">
        <span class="pill">Preset: quick</span>
        <span class="pill">Members: Director, Stats Modeler, Risk Manager</span>
      </div>
    </div>
    <div class="card">
      <h2>Brief</h2>
      <div>- 賽事：La Liga / Atlético Madrid vs Barcelona<br>- 開賽時間：本週六<br>- 目標市場：AH + OU<br>- 問題：測試修復後是否能正常產出各委員分析與最終報告</div>
    </div>
    <div class="card">
      <h2>Board Report</h2>
      <div>Director 無法產出最終報告。</div>
    </div>
  </div>
</body>
</html>
